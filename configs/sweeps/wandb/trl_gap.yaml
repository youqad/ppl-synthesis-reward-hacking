program: scripts/hydra_train_trl.py
method: bayes
metric:
  name: sweep/final_gap_mean
  goal: maximize

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - launcher=slurm
  - ${args_no_hyphens}

parameters:
  train.lr:
    values: [5.0e-6, 1.0e-5, 2.0e-5]
  train.temperature:
    distribution: uniform
    min: 1.0
    max: 1.3
  train.top_p:
    values: [0.9, 0.95, 0.98]
  train.kl_beta:
    values: [0.01, 0.02, 0.05]
  train.lora_rank:
    values: [16, 32, 64]
  train.rollouts_per_prompt:
    values: [4, 8, 12]

