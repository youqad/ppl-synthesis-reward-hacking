program: scripts/hydra_train_tinker.py
method: bayes
metric:
  name: paper/lh_formal_signal_final
  goal: maximize

early_terminate:
  type: hyperband
  min_iter: 60
  eta: 2

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - launcher=local
  - train/paper_track=part_a_emergence
  - train/claim_mode=formal_lh
  - train/monitoring_mode=judge_evolving
  - train/reward_metric=log_marginal_likelihood
  - train/reward_data_split=train
  - train/predictive_estimator=none
  - train/normalization=exact_binary
  - train/data_interface=raw_bernoulli_d3
  - train.data_interface.dataset_n_train=1
  - train.judge_backend=zai
  - train.judge_model=anthropic/glm-5
  - train.monitoring_mode.judge_interval=10
  - train.monitoring_mode.rubric_evolution_interval=10
  - train.judge_sampling_policy=fixed_cap
  - train.judge_sample_size=20
  - train.judge_batch_mode=auto
  - train.judge_batch_max_workers=32
  - train.track_lh_every_batch=true
  - ${args_no_hyphens}

parameters:
  train.base_model:
    values: [Qwen/Qwen3-4B-Instruct-2507]
  train.n_steps:
    values: [300, 600]
  train.n_prompts:
    values: [4, 5]
  train.rollouts_per_prompt:
    values: [120, 160]
  train.learning_rate:
    values: [5.0e-6, 1.0e-5, 2.0e-5]
  train.temperature:
    distribution: uniform
    min: 1.10
    max: 1.35
  train.top_p:
    values: [0.92, 0.95, 0.98]
  train.top_k:
    values: [30, 50, 80]
  train.data_interface.dataset_n_features:
    values: [1, 3, 5]
  train.smc_draws:
    values: [300, 500]
  train.normalization.normalization_interval:
    values: [1, 2]
  train.normalization.normalization_sample_size:
    values: [20, 40]
  train.scoring_workers:
    values: [1, 2]
