program: scripts/hydra_train_trl.py
method: bayes
metric:
  name: paper/lh_formal_signal_final
  goal: maximize

early_terminate:
  type: hyperband
  min_iter: 20
  eta: 2

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - launcher=slurm
  - train/paper_track=part_a_emergence
  - train/claim_mode=formal_lh
  - train/monitoring_mode=off
  - train/reward_metric=log_marginal_likelihood
  - train/reward_data_split=train
  - train/reward_estimator_backend=smc
  - train/normalization=exact_binary
  - train/data_interface=raw_bernoulli_d3
  - train.data_interface.dataset_n_train=1
  - ${args_no_hyphens}

parameters:
  train.model:
    values: [Qwen/Qwen3-4B-Instruct-2507]
  train.n_steps:
    values: [150, 300, 600]
  train.n_prompts:
    values: [32, 64, 100]
  train.rollouts_per_prompt:
    values: [4, 8, 12]
  train.num_generations:
    values: [4, 8]
  train.lr:
    values: [3.0e-6, 5.0e-6, 1.0e-5]
  train.temperature:
    distribution: uniform
    min: 1.0
    max: 1.3
  train.top_p:
    values: [0.9, 0.95, 0.98]
  train.top_k:
    values: [0, 20, 50]
  train.kl_beta:
    values: [5.0e-4, 1.0e-3, 5.0e-3]
  train.lora_rank:
    values: [16, 32, 64]
  train.data_interface.dataset_n_features:
    values: [1, 3]
  train.smc_draws:
    values: [300, 500]
  train.normalization.normalization_interval:
    values: [1, 2, 5]
  train.normalization.normalization_sample_size:
    values: [8, 16, 24]
