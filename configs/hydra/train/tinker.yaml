defaults:
  - reward_metric: log_marginal_likelihood
  - reward_data_split: train
  - predictive_estimator: none
  - claim_mode: formal_lh
  - normalization: auto
  - data_interface: raw_bernoulli_d3
  - paper_track: part_a_emergence
  - monitoring_mode: "off"
  - _self_

name: tinker
base_model: Qwen/Qwen3-4B-Instruct-2507
lora_rank: 32
n_steps: 1000
n_prompts: 5
rollouts_per_prompt: 160
learning_rate: 1e-5
temperature: 1.28
top_p: 1.0
top_k: 0
max_tokens: 512
loss_fn: importance_sampling
exec_timeout: 60
scoring_seed_base: 0
smc_draws: 500
scoring_workers: 1
dataset_p_true_alpha: 1.0
dataset_p_true_beta: 1.0
dataset_p_true_fixed: null

# judge API params (used only when monitoring_mode != off)
judge_sample_size: 20
judge_dedup: true
judge_backend: zai
judge_model: anthropic/glm-5
judge_api_base: null
judge_custom_llm_provider: null
judge_api_key_env: null
judge_use_stub: false
judge_env_file: null
judge_sampling_policy: fixed_cap
judge_adaptive_min: 8
judge_adaptive_max: 20
judge_adaptive_target_metric: combined
judge_batch_mode: auto
judge_batch_max_workers: 32
track_lh_every_batch: true
artifact_sync_interval: 50
artifact_sync_min_steps: 300

output_dir: ${common.output_root}/${common.run_name}
