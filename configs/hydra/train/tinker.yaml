defaults:
  - reward_metric: log_marginal_likelihood
  - reward_data_split: train
  - predictive_estimator: none
  - data_interface: raw_bernoulli_d3
  - paper_track: part_a_emergence
  - monitoring_mode: "off"
  - _self_

name: tinker
base_model: Qwen/Qwen3-4B-Instruct-2507
lora_rank: 32
n_steps: 1000
n_prompts: 5
rollouts_per_prompt: 160
learning_rate: 1e-5
temperature: 1.28
top_p: 0.95
top_k: 50
max_tokens: 512
loss_fn: importance_sampling
exec_timeout: 60
scoring_seed_base: 0
smc_draws: 500
scoring_workers: 1

# judge API params (used only when monitoring_mode != off)
judge_sample_size: 20
judge_dedup: true
judge_model: anthropic/glm-5
judge_use_stub: false
judge_env_file: null

output_dir: ${common.output_root}/${common.run_name}
