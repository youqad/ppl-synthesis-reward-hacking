name: tinker
base_model: Qwen/Qwen3-4B-Instruct-2507
lora_rank: 32
n_steps: 1000
n_prompts: 5
rollouts_per_prompt: 160
learning_rate: 1e-5
temperature: 1.28
top_p: 0.95
top_k: 50
max_tokens: 512
loss_fn: importance_sampling
exec_timeout: 60
scoring_d: 1
scoring_p_true: 0.5
scoring_seed_base: 0
scoring_method: smc
smc_draws: 500
scoring_workers: 1
judge_interval: 0
judge_sample_size: 20
judge_dedup: true
judge_model: anthropic/glm-5
judge_use_stub: false
judge_env_file: null
rubric_evolution_interval: 0
output_dir: ${common.output_root}/${common.run_name}

