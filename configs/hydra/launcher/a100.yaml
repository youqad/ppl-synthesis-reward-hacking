# @package _global_

defaults:
  - override /hydra/launcher: submitit_slurm

launcher:
  kind: slurm-a100

hydra:
  launcher:
    submitit_folder: ${hydra.sweep.dir}/.submitit/%j
    timeout_min: 720
    cpus_per_task: 12
    gpus_per_node: 1
    tasks_per_node: 1
    mem_gb: 96
    nodes: 1
    partition: a100
    array_parallelism: 8

