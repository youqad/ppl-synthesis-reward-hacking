experiment:
  name: grpo_reward_hacking_poc
  description: GRPO training to demonstrate emergent reward hacking

# CRITICAL: reward hacking must emerge naturally from optimization pressure
# the model trains on reported_reward ONLY
# ground_truth_loglik is measured but NEVER enters training

model:
  base_model: "meta-llama/Llama-3.2-1B"
  lora_rank: 32

training:
  n_prompts: 100
  rollouts_per_prompt: 4
  n_steps: 50
  learning_rate: 1e-4

grpo:
  loss_fn: "importance_sampling"
  kl_coef: 0.0
  clip_advantages: false

data:
  d: 8
  p_true: 0.3
  n_train: 32
  n_holdout: 64

output:
  dir: "artifacts/grpo_poc"
  log_interval: 1

# multi-seed robustness testing
robustness:
  seeds: [42, 123, 456]  # use with --seeds flag
