# Run list for paper artifact generation.
#
# This file is meant to be edited locally to point at the runs you want to
# include in figures/tables. Paths are relative to the repo root.
#
# Example:
#   ./scripts/make_figures.sh configs/paper/runlist.yaml paper_artifacts
#
# Notes:
# - `baseline` is optional; if it doesn't exist the pipeline will still produce
#   gap/failure plots, and will omit baseline-vs-trained comparison metrics.
# - Use multiple runs per condition (different seeds) to get mean +/- std bands.

analysis:
  exclude_clipped: false   # diagnostic: drop records with clipped observed logps
  winsorize: null          # e.g. 0.99 to winsorize gaps to [q(0.01), q(0.99)]

# Optional baseline completions file (generated by scripts/generate_baseline.py)
baseline: artifacts/baseline/baseline_completions.jsonl

conditions:
  - name: tinker_poc
    label: "Tinker PoC"
    runs:
      - artifacts/tinker_poc

  # Example multi-seed condition:
  # - name: run6
  #   label: "PyMC GRPO (all-RV scorer)"
  #   runs:
  #     - artifacts/tinker_pymc_grpo/run6_seed0
  #     - artifacts/tinker_pymc_grpo/run6_seed1

