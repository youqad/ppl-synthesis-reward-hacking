# Run list for paper artifact generation.
#
# Defaults: Part A emergence, formal LH claim mode, Run 7 seeds.
# Paths are relative to repo root.

analysis:
  exclude_clipped: false
  winsorize: null

# Optional baseline completions file (generated by scripts/generate_baseline.py)
baseline: artifacts/baseline/baseline_completions.jsonl

conditions:
  - name: run7_part_a_emergence
    label: "Run 7 Part A (seeds 0 + 10k)"
    runs:
      # These run dirs are archived completion logs; they intentionally provide
      # paper metadata overrides inline because hydra sidecars are not always present.
      - path: artifacts/sweeps/tinker_20260217_163634
        paper_track: part_a_emergence
        claim_mode: formal_lh
        logging_valid: true
      - path: artifacts/sweeps/tinker_20260217_163636
        paper_track: part_a_emergence
        claim_mode: formal_lh
        logging_valid: true
