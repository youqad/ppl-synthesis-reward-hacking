# Figure/table configuration for paper artifacts.
#
# This file documents the expected paper-facing outputs and naming convention.

figures:
  lh_emergence_3panel:
    source: figures/lh_emergence_3panel.pdf
    metrics:
      - reward_gt0_frac
      - max_reward
      - norm_frac_non_normalized

  potential_prevalence:
    source: figures/potential_prevalence.pdf
    metric: has_potential_frac

  reward_trajectory:
    source: figures/reward_trajectory.pdf
    metric: mean_reward

tables:
  aggregate_training_stats:
    section_label: tab:aggregate
    metrics:
      - total_programs
      - valid_programs
      - reward_gt0_count
      - potential_count
      - ceiling_hits
      - max_norm_failure

  safety_gate_matrix:
    file: safety_gate_matrix_table.tex
